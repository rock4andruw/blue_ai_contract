<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blue-AI 合約智能比對助理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:         #1C2331;
      --ink-light:   #5A6478;
      --parchment:   #F5F4F0;
      --surface:     #FFFFFF;
      --gold:        #9A6F00;
      --gold-light:  #FDF5DC;
      --red:         #C41E3A;
      --red-light:   #FEF0F2;
      --green:       #2E7D4F;
      --green-light: #EDF7F1;
      --border:      #DDD8CE;
      --border-mid:  #B8A990;
      --radius:      4px;
      --shadow:      0 1px 3px rgba(28,35,49,.07), 0 1px 2px rgba(28,35,49,.04);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
      background: var(--parchment);
      color: var(--ink);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Header ── */
    header {
      background: var(--ink);
      color: #fff;
      padding: 18px 36px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 3px solid var(--gold);
    }
    header .logo { font-size: 22px; }
    header h1 {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 21px;
      font-weight: 600;
      letter-spacing: .2px;
    }
    header p { font-size: 12px; opacity: .6; margin-top: 2px; letter-spacing: .2px; }

    /* ── Layout ── */
    .container { max-width: 980px; margin: 0 auto; padding: 28px 24px 72px; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 28px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }
    .card-title {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      padding: 9px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--ink-light);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color .15s, border-color .15s;
      letter-spacing: .2px;
    }
    .tab.active { color: var(--ink); border-bottom-color: var(--gold); }
    .tab:hover:not(.active) { color: var(--ink); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Upload zone ── */
    .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .upload-box {
      border: 1px dashed var(--border-mid);
      border-radius: var(--radius);
      padding: 22px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      background: var(--parchment);
    }
    .upload-box:hover, .upload-box.dragover {
      border-color: var(--gold);
      background: var(--gold-light);
    }
    .upload-box input[type=file] { display: none; }
    .upload-box .icon { font-size: 24px; margin-bottom: 6px; }
    .upload-box .label { font-size: 12px; color: var(--ink-light); line-height: 1.5; }
    .upload-box .filename {
      margin-top: 8px;
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      font-size: 11px;
      font-weight: 500;
      color: var(--gold);
      word-break: break-all;
    }

    /* ── Example buttons ── */
    .example-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .example-btn {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 10px;
      text-align: center;
      cursor: pointer;
      background: var(--surface);
      transition: border-color .15s, box-shadow .15s;
      font-size: 13px;
    }
    .example-btn:hover {
      border-color: var(--gold);
      box-shadow: 0 2px 8px rgba(154,111,0,.12);
    }
    .example-btn .badge {
      display: inline-block;
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      font-size: 10px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 2px;
      margin-bottom: 6px;
      letter-spacing: .3px;
      text-transform: uppercase;
    }
    .badge-red { background: var(--red-light); color: var(--red); }
    .badge-yellow { background: var(--gold-light); color: var(--gold); }
    .example-btn .desc { font-size: 11.5px; color: var(--ink-light); margin-top: 4px; line-height: 1.4; }

    /* ── Sections count ── */
    .sections-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
      font-size: 13px;
      color: var(--ink-light);
    }
    .sections-row input[type=range] { width: 120px; accent-color: var(--gold); }
    .sections-row span { font-weight: 600; color: var(--ink); min-width: 16px; }

    /* ── Submit button ── */
    .btn-primary {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: var(--ink);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background .15s;
      letter-spacing: .3px;
    }
    .btn-primary:hover { background: #2d3748; }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Loading ── */
    #loading {
      display: none;
      text-align: center;
      padding: 48px;
      color: var(--ink-light);
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .9s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results ── */
    #results { display: none; }
    #results:focus { outline: none; }

    .summary-bar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .stat-box {
      flex: 1;
      min-width: 110px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .stat-box .num {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 34px;
      font-weight: 600;
      line-height: 1;
    }
    .stat-box .lbl {
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      font-size: 10px;
      color: var(--ink-light);
      margin-top: 5px;
      letter-spacing: .4px;
      text-transform: uppercase;
    }
    .stat-red .num { color: var(--red); }
    .stat-yellow .num { color: var(--gold); }
    .stat-blue .num { color: var(--ink); }

    /* verdict banner */
    .verdict {
      border-radius: var(--radius);
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 14px;
      border-left: 4px solid;
      letter-spacing: .2px;
    }
    .verdict-high   { background: var(--red-light);   color: var(--red);   border-left-color: var(--red);   }
    .verdict-medium { background: var(--gold-light);  color: var(--gold);  border-left-color: var(--gold);  }
    .verdict-low,
    .verdict-none   { background: var(--green-light); color: var(--green); border-left-color: var(--green); }

    /* ── Key changes — SIGNATURE: colored margin stripe ── */
    .change-item {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
      overflow: hidden;
    }
    .change-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 16px;
      cursor: pointer;
      background: var(--surface);
      user-select: none;
      border-left: 4px solid var(--border-mid);
    }
    .change-header:hover { background: var(--parchment); }

    /* margin annotation stripe by risk — the design's signature element */
    .change-item-high   .change-header { border-left-color: var(--red); }
    .change-item-medium .change-header { border-left-color: var(--gold); }
    .change-item-low    .change-header { border-left-color: var(--green); }

    .change-rank {
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      font-size: 11px;
      color: var(--ink-light);
      min-width: 20px;
    }
    .risk-badge {
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      font-size: 10px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 2px;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: .3px;
    }
    .risk-high   { background: var(--red-light);   color: var(--red);   }
    .risk-medium { background: var(--gold-light);  color: var(--gold);  }
    .risk-low    { background: var(--green-light); color: var(--green); }
    .change-title  { font-size: 13px; font-weight: 600; flex: 1; }
    .change-clause {
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      font-size: 11px;
      color: var(--ink-light);
    }
    .chevron { font-size: 10px; color: var(--ink-light); transition: transform .2s; }
    .chevron.open { transform: rotate(180deg); }

    .change-body {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: none;
      font-size: 13px;
      line-height: 1.65;
      background: var(--parchment);
    }
    .change-body.open { display: block; }
    .change-body .field-label {
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      font-size: 10px;
      font-weight: 500;
      color: var(--ink-light);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-top: 14px;
      margin-bottom: 5px;
    }
    .change-body .field-label:first-child { margin-top: 0; }
    .options-list { list-style: none; padding: 0; }
    .options-list li {
      padding: 6px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 5px;
      font-size: 12.5px;
    }
    .options-list li::before { content: "→ "; color: var(--gold); font-weight: 700; }

    /* risk flags table */
    .risk-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .risk-table th {
      text-align: left;
      padding: 8px 12px;
      background: var(--parchment);
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      font-size: 10px;
      color: var(--ink-light);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .4px;
      border-bottom: 1px solid var(--border);
    }
    .risk-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .risk-table tr:last-child td { border-bottom: none; }
    .risk-table td:first-child {
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      font-size: 12px;
      font-weight: 500;
    }

    /* review advice */
    .advice-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .advice-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 2px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid;
    }
    .chip-must    { background: var(--red-light);   color: var(--red);   border-color: #FACDD3; }
    .chip-suggest { background: var(--gold-light);  color: var(--gold);  border-color: #EDD68A; }
    .chip-ok      { background: var(--green-light); color: var(--green); border-color: #B6E2C8; }

    /* download */
    .btn-dl {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      color: var(--ink-light);
      transition: border-color .15s, color .15s, background .15s;
      letter-spacing: .2px;
    }
    .btn-dl:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-light); }

    /* meta info */
    .meta { font-size: 11.5px; color: var(--ink-light); margin-bottom: 14px; }
    .mode-badge {
      display: inline-block;
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 2px;
      background: var(--parchment);
      color: var(--ink-light);
      border: 1px solid var(--border);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .3px;
    }

    /* error */
    #error-box {
      display: none;
      background: var(--red-light);
      color: var(--red);
      border-radius: var(--radius);
      border-left: 4px solid var(--red);
      padding: 12px 16px;
      margin-bottom: 14px;
      font-size: 13px;
    }

    /* button resets */
    button.upload-box, button.example-btn { font-family: inherit; width: 100%; }
    button.change-header { width: 100%; text-align: left; font-family: inherit; font-size: inherit; }
  </style>
</head>
<body>

<header>
  <div class="logo" aria-hidden="true">📋</div>
  <div>
    <h1>Blue-AI 合約智能比對助理</h1>
    <p>像有一個資深法務顧問幫你審合約</p>
  </div>
</header>

<div class="container">

  <!-- Input card -->
  <div class="card">
    <div class="card-title"><span aria-hidden="true">⚖️</span> 合約比對</div>

    <div class="tabs" role="tablist">
      <button class="tab active" role="tab" id="tab-btn-upload" aria-selected="true" aria-controls="tab-upload" onclick="switchTab('upload')">上傳合約</button>
      <button class="tab" role="tab" id="tab-btn-example" aria-selected="false" aria-controls="tab-example" onclick="switchTab('example')">範例模式</button>
    </div>

    <!-- Upload tab -->
    <div id="tab-upload" class="tab-panel active" role="tabpanel" aria-labelledby="tab-btn-upload">
      <div class="upload-grid">
        <div>
          <label for="file-orig" style="font-size:12px;font-weight:600;color:#374151;margin-bottom:8px;display:block;">原始合約（甲方版本）</label>
          <button type="button" class="upload-box" id="drop-orig" aria-label="上傳原始合約（甲方版本），支援 PDF、DOCX、MD 格式" onclick="document.getElementById('file-orig').click()">
            <input type="file" id="file-orig" accept=".pdf,.docx,.md,.txt" onchange="onFileSelected('orig', this)">
            <div class="icon" aria-hidden="true">📄</div>
            <div class="label">點擊或拖曳上傳<br>PDF / DOCX / MD</div>
            <div class="filename" id="fname-orig"></div>
          </button>
        </div>
        <div>
          <label for="file-rev" style="font-size:12px;font-weight:600;color:#374151;margin-bottom:8px;display:block;">修訂合約（供應商版本）</label>
          <button type="button" class="upload-box" id="drop-rev" aria-label="上傳修訂合約（供應商版本），支援 PDF、DOCX、MD 格式" onclick="document.getElementById('file-rev').click()">
            <input type="file" id="file-rev" accept=".pdf,.docx,.md,.txt" onchange="onFileSelected('rev', this)">
            <div class="icon" aria-hidden="true">📝</div>
            <div class="label">點擊或拖曳上傳<br>PDF / DOCX / MD</div>
            <div class="filename" id="fname-rev"></div>
          </button>
        </div>
      </div>
      <button class="btn-primary" id="btn-upload" onclick="runUpload()" disabled>開始比對</button>
    </div>

    <!-- Example tab -->
    <div id="tab-example" class="tab-panel" role="tabpanel" aria-labelledby="tab-btn-example">
      <div style="font-size:13px;color:var(--ink-light);margin-bottom:14px;">
        以「SLA-like Base Contract v1」為基準，選擇修訂版本：
      </div>
      <div class="example-grid">
        <button type="button" class="example-btn" onclick="runExample('v2')">
          <div class="badge badge-red">高風險</div>
          <div style="font-weight:700;">v2 服務降級</div>
          <div class="desc">SLA 可用率放寬<br>回應時間拉長</div>
        </button>
        <button type="button" class="example-btn" onclick="runExample('v3')">
          <div class="badge badge-red">高風險</div>
          <div style="font-weight:700;">v3 責任加重</div>
          <div class="desc">賠償上限縮水<br>責任條款不利</div>
        </button>
        <button type="button" class="example-btn" onclick="runExample('v4')">
          <div class="badge badge-red">高風險</div>
          <div style="font-weight:700;">v4 保護刪減</div>
          <div class="desc">保護條款消失<br>免責範圍擴大</div>
        </button>
        <button type="button" class="example-btn" onclick="runExample('v5')">
          <div class="badge badge-yellow">中風險</div>
          <div style="font-weight:700;">v5 終止偏甲方</div>
          <div class="desc">終止條件改變<br>通知期調整</div>
        </button>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading" aria-live="polite" aria-label="分析中，請稍候">
    <div class="spinner" aria-hidden="true"></div>
    <div>分析中，請稍候…</div>
  </div>

  <!-- Error -->
  <div id="error-box" role="alert"></div>

  <!-- Results -->
  <div id="results" tabindex="-1">

    <!-- Meta -->
    <div class="meta" id="result-meta"></div>

    <!-- Verdict -->
    <div class="verdict" id="result-verdict"></div>

    <!-- Stats -->
    <div class="summary-bar" id="result-stats"></div>

    <!-- Key changes -->
    <div class="card">
      <div class="card-title"><span aria-hidden="true">🔍</span> 主要變更重點</div>
      <div id="result-changes"></div>
    </div>

    <!-- Review advice -->
    <div class="card">
      <div class="card-title"><span aria-hidden="true">📋</span> 審閱建議</div>
      <div class="advice-row" id="result-advice"></div>
    </div>

    <!-- Risk flags table -->
    <div class="card">
      <div class="card-title"><span aria-hidden="true">🚩</span> 完整風險旗標</div>
      <div style="overflow-x:auto;">
        <table class="risk-table">
          <thead>
            <tr>
              <th>條款</th>
              <th>風險等級</th>
              <th>風險類型</th>
              <th>觸發原因</th>
            </tr>
          </thead>
          <tbody id="result-flags"></tbody>
        </table>
      </div>
    </div>

    <!-- Download -->
    <div style="text-align:right;margin-top:-6px;">
      <a class="btn-dl" id="btn-download" href="#" download="contract_report.md">
        <span aria-hidden="true">⬇</span> 下載完整報告 (.md)
      </a>
    </div>

  </div><!-- /results -->

</div><!-- /container -->

<script>
  const API = 'http://localhost:8000';

  // ── Tab switch ────────────────────────────────────────────────────────────
  function switchTab(t) {
    document.querySelectorAll('.tab').forEach((el, i) => {
      const isActive = (i === 0 && t === 'upload') || (i === 1 && t === 'example');
      el.classList.toggle('active', isActive);
      el.setAttribute('aria-selected', isActive ? 'true' : 'false');
    });
    document.getElementById('tab-upload').classList.toggle('active', t === 'upload');
    document.getElementById('tab-example').classList.toggle('active', t === 'example');
  }

  // ── File upload ───────────────────────────────────────────────────────────
  function onFileSelected(side, input) {
    const name = input.files[0]?.name || '';
    document.getElementById(`fname-${side}`).textContent = name;
    const orig = document.getElementById('file-orig').files.length;
    const rev  = document.getElementById('file-rev').files.length;
    document.getElementById('btn-upload').disabled = !(orig && rev);
  }

  // drag & drop
  ['orig','rev'].forEach(side => {
    const box = document.getElementById(`drop-${side}`);
    box.addEventListener('dragover', e => { e.preventDefault(); box.classList.add('dragover'); });
    box.addEventListener('dragleave', () => box.classList.remove('dragover'));
    box.addEventListener('drop', e => {
      e.preventDefault();
      box.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (!file) return;
      const input = document.getElementById(`file-${side}`);
      const dt = new DataTransfer();
      dt.items.add(file);
      input.files = dt.files;
      onFileSelected(side, input);
    });
  });

  // ── API calls ─────────────────────────────────────────────────────────────
  async function runUpload() {
    const orig = document.getElementById('file-orig').files[0];
    const rev  = document.getElementById('file-rev').files[0];
    const form = new FormData();
    form.append('original_file', orig);
    form.append('revised_file', rev);
    showLoading();
    try {
      const res = await fetch(`${API}/api/v1/contracts/compare`, { method: 'POST', body: form });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || '比對失敗');
      renderResults(data);
    } catch(e) { showError(e.message); }
  }

  async function runExample(id) {
    showLoading();
    try {
      const res = await fetch(`${API}/api/v1/contracts/compare/example/${id}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || '比對失敗');
      renderResults(data);
    } catch(e) { showError(e.message); }
  }

  // ── UI helpers ────────────────────────────────────────────────────────────
  function showLoading() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('results').style.display = 'none';
    document.getElementById('error-box').style.display = 'none';
  }

  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    const box = document.getElementById('error-box');
    box.innerHTML = '<span aria-hidden="true">⚠</span> ' + escHtml(msg) + '（請確認後端服務已啟動：uvicorn src.api.main:app --port 8000）';
    box.style.display = 'block';
  }

  const LEVEL_EMOJI = { high: '🔴', medium: '🟡', low: '🟢', none: '⚪' };
  const LEVEL_ZH    = { high: '高風險', medium: '中風險', low: '低風險', none: '無風險' };
  const RISK_CLASS  = { high: 'risk-high', medium: 'risk-medium', low: 'risk-low' };
  const VERDICT_CLASS = { high: 'verdict-high', medium: 'verdict-medium', low: 'verdict-low', none: 'verdict-none' };

  function renderResults(d) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('results').style.display = 'block';

    // meta
    const modeLabel = d.summary_mode === 'claude_api'
      ? '<span class="mode-badge">Claude AI</span>'
      : d.summary_mode === 'gemini_api'
      ? '<span class="mode-badge">Gemini AI</span>'
      : '<span class="mode-badge">範本模式</span>';
    document.getElementById('result-meta').innerHTML =
      `原始：<strong>${d.original_filename}</strong> &nbsp;→&nbsp; 修訂：<strong>${d.revised_filename}</strong>
       &nbsp;｜&nbsp; ${d.compare_date} &nbsp;｜&nbsp; 處理時間 ${d.processing_time_ms}ms &nbsp;｜&nbsp; ${modeLabel}`;

    // verdict
    const vEl = document.getElementById('result-verdict');
    const vEmoji = LEVEL_EMOJI[d.overall_risk_level] || '';
    const vZh    = LEVEL_ZH[d.overall_risk_level] || '';
    const vClass = VERDICT_CLASS[d.overall_risk_level] || 'verdict-none';
    vEl.className = `verdict ${vClass}`;
    vEl.innerHTML = `<span aria-hidden="true">${vEmoji}</span> 整體評估：${vZh}`;

    // stats
    document.getElementById('result-stats').innerHTML = `
      <div class="stat-box stat-blue"><div class="num">${d.total_changes}</div><div class="lbl">總變動條款</div></div>
      <div class="stat-box stat-red"><div class="num">${d.high_risk_count}</div><div class="lbl">高風險</div></div>
      <div class="stat-box stat-yellow"><div class="num">${d.medium_risk_count}</div><div class="lbl">中風險</div></div>
      <div class="stat-box"><div class="num">${d.low_risk_count}</div><div class="lbl">低風險</div></div>
    `;

    // key changes
    const changesEl = document.getElementById('result-changes');
    if (!d.key_changes.length) {
      changesEl.innerHTML = '<p style="color:var(--ink-light);font-size:13px;">未偵測到顯著風險條款。</p>';
    } else {
      const isNum = s => /^[\d一二三四五六七八九十\.]+$/.test(s);
      const fmtClause = s => isNum(s) ? `第 ${escHtml(s)} 條` : escHtml(s);
      changesEl.innerHTML = d.key_changes.map((c, i) => `
        <div class="change-item change-item-${c.risk_level}">
          <button type="button" class="change-header" onclick="toggleChange(${i})" aria-expanded="false" id="chev-btn-${i}">
            <div class="change-rank" aria-hidden="true">${c.rank}</div>
            <span class="risk-badge ${RISK_CLASS[c.risk_level] || ''}" aria-hidden="true">${LEVEL_ZH[c.risk_level]}</span>
            <span class="change-title">${escHtml(c.risk_name)}</span>
            <span class="change-clause">${fmtClause(c.clause_id)}</span>
            <span class="chevron" id="chev-${i}" aria-hidden="true">▼</span>
          </button>
          <div class="change-body" id="body-${i}">
            <div class="field-label">說明</div>
            <div>${escHtml(c.plain_summary)}</div>
            <div class="field-label">商業影響</div>
            <div>${escHtml(c.business_impact)}</div>
            <div class="field-label">協商對策</div>
            <ul class="options-list">
              ${c.negotiation_options.map(o => `<li>${escHtml(o)}</li>`).join('')}
            </ul>
          </div>
        </div>
      `).join('');
      d.key_changes.forEach((c, i) => { if (c.risk_level === 'high') toggleChange(i); });
    }

    // review advice
    const advEl = document.getElementById('result-advice');
    let advHtml = '';
    if (d.review_advice.must_negotiate.length) {
      advHtml += `<div class="advice-chip chip-must"><span aria-hidden="true">🔴</span> 必須協商：第 ${d.review_advice.must_negotiate.join('、')} 條</div>`;
    }
    if (d.review_advice.suggested_negotiate.length) {
      advHtml += `<div class="advice-chip chip-suggest"><span aria-hidden="true">🟡</span> 建議協商：第 ${d.review_advice.suggested_negotiate.join('、')} 條</div>`;
    }
    if (d.review_advice.acceptable_count > 0) {
      advHtml += `<div class="advice-chip chip-ok"><span aria-hidden="true">🟢</span> 可接受：其他 ${d.review_advice.acceptable_count} 處行政性變更</div>`;
    }
    advEl.innerHTML = advHtml || '<span style="color:var(--ink-light);font-size:13px;">無需特別協商。</span>';

    // risk flags table
    document.getElementById('result-flags').innerHTML = d.all_risk_flags.map(f => `
      <tr>
        <td>${escHtml(f.clause_id)}</td>
        <td><span class="risk-badge ${RISK_CLASS[f.risk_level] || ''}"><span aria-hidden="true">${LEVEL_EMOJI[f.risk_level]}</span> ${LEVEL_ZH[f.risk_level]}</span></td>
        <td>${escHtml(f.risk_name)}</td>
        <td style="color:var(--ink-light)">${escHtml(f.trigger_reason)}</td>
      </tr>
    `).join('');

    // download markdown
    const blob = new Blob([d.markdown_report], { type: 'text/markdown' });
    const url  = URL.createObjectURL(blob);
    const dl   = document.getElementById('btn-download');
    dl.href = url;
    dl.download = `contract_report_${d.compare_date}.md`;

    const resultsEl = document.getElementById('results');
    resultsEl.focus();
    window.scrollTo({ top: resultsEl.offsetTop - 20, behavior: 'smooth' });
  }

  function toggleChange(i) {
    const body = document.getElementById(`body-${i}`);
    const chev = document.getElementById(`chev-${i}`);
    const btn  = document.getElementById(`chev-btn-${i}`);
    const isOpen = body.classList.toggle('open');
    chev.classList.toggle('open');
    if (btn) btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
